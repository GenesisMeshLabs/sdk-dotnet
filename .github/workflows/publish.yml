name: publish

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write  # required for NuGet Trusted Publishing (OIDC)
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --logger "console;verbosity=normal"

      - name: Pack
        run: dotnet pack src/GenesisMesh.Sdk/GenesisMesh.Sdk.csproj --no-build --configuration Release --output ./artifacts

      - name: Obtain GitHub OIDC token (audience api.nuget.org)
        id: oidc
        uses: actions/github-script@v7
        with:
          script: |
            const token = await core.getIDToken('api.nuget.org');
            core.setSecret(token);
            core.setOutput('token', token);

      - name: Exchange OIDC token for NuGet scoped API key
        id: nuget-auth
        env:
          OIDC_TOKEN: ${{ steps.oidc.outputs.token }}
        run: |
          RESPONSE=$(curl -sS -X POST \
            -H "Authorization: Bearer $OIDC_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.nuget.org/v1/authentication/authenticate")

          echo "NuGet auth HTTP response (masked key): $(echo "$RESPONSE" | jq -r 'to_entries | map(if .key == "token" or .key == "key" then .key + ": [MASKED]" else .key + ": " + (.value | tostring) end) | .[]' 2>/dev/null || echo "$RESPONSE")"

          API_KEY=$(echo "$RESPONSE" | jq -r '.token // .key // empty' 2>/dev/null)

          if [ -z "$API_KEY" ] || [ "$API_KEY" = "null" ]; then
            echo "Failed to obtain NuGet API key. Full response:" >&2
            echo "$RESPONSE" >&2
            exit 1
          fi

          echo "::add-mask::$API_KEY"
          echo "apikey=$API_KEY" >> "$GITHUB_OUTPUT"

      - name: Push to NuGet
        run: >
          dotnet nuget push ./artifacts/*.nupkg
          --source https://api.nuget.org/v3/index.json
          --api-key ${{ steps.nuget-auth.outputs.apikey }}
          --skip-duplicate
