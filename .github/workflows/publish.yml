name: publish

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write  # required for NuGet Trusted Publishing (OIDC)
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --logger "console;verbosity=normal"

      - name: Pack
        run: dotnet pack src/GenesisMesh.Sdk/GenesisMesh.Sdk.csproj --no-build --configuration Release --output ./artifacts

      - name: Obtain GitHub OIDC token (audience api.nuget.org)
        id: oidc
        uses: actions/github-script@v7
        with:
          script: |
            const token = await core.getIDToken('api.nuget.org');
            core.setSecret(token);
            core.setOutput('token', token);

            // Decode payload for diagnostics (NuGet trusted publisher matching)
            const payload = JSON.parse(Buffer.from(token.split('.')[1], 'base64url').toString());
            const diag = {
              iss: payload.iss,
              aud: payload.aud,
              sub: payload.sub,
              repository: payload.repository,
              repository_id: payload.repository_id,
              repository_owner: payload.repository_owner,
              repository_owner_id: payload.repository_owner_id,
              workflow_ref: payload.workflow_ref,
              environment: payload.environment || '(none)',
            };
            console.log('OIDC token claims:', JSON.stringify(diag, null, 2));

      - name: Push to NuGet (Trusted Publishing)
        env:
          NUGET_TOKEN: ${{ steps.oidc.outputs.token }}
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --source https://api.nuget.org/v3/index.json \
            --api-key "$NUGET_TOKEN" \
            --skip-duplicate
