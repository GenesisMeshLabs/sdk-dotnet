name: publish

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write  # required for NuGet Trusted Publishing (OIDC)
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --logger "console;verbosity=normal"

      - name: Pack
        run: dotnet pack src/GenesisMesh.Sdk/GenesisMesh.Sdk.csproj --no-build --configuration Release --output ./artifacts

      - name: Obtain GitHub OIDC token (audience api.nuget.org)
        id: oidc
        uses: actions/github-script@v7
        with:
          script: |
            const token = await core.getIDToken('api.nuget.org');
            core.setSecret(token);
            core.setOutput('token', token);

      # NuGet Trusted Publishing: the OIDC JWT is used directly as the API key.
      # NuGet.org validates the JWT against the trusted publisher policy configured
      # at https://www.nuget.org/account/profile under "Trusted Publishers".
      - name: Push to NuGet
        env:
          NUGET_TOKEN: ${{ steps.oidc.outputs.token }}
        run: >
          dotnet nuget push ./artifacts/*.nupkg
          --source https://api.nuget.org/v3/index.json
          --api-key "$NUGET_TOKEN"
          --skip-duplicate
