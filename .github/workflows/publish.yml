name: publish

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write  # required for NuGet Trusted Publishing (OIDC)
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --logger "console;verbosity=normal"

      - name: Pack
        run: dotnet pack src/GenesisMesh.Sdk/GenesisMesh.Sdk.csproj --no-build --configuration Release --output ./artifacts

      - name: Get NuGet API key from Trusted Publisher (OIDC)
        id: nuget-auth
        run: |
          # Step 1 — get GitHub OIDC token scoped to api.nuget.org
          OIDC_TOKEN=$(curl -sS \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=api.nuget.org" \
            | jq -r .value)

          # Step 2 — exchange with NuGet for a scoped temporary API key
          RESPONSE=$(curl -sS -X POST \
            -H "Authorization: Bearer $OIDC_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.nuget.org/v1/authentication/authenticate")

          API_KEY=$(echo "$RESPONSE" | jq -r '.token // .key // empty')

          if [ -z "$API_KEY" ]; then
            echo "NuGet auth response: $RESPONSE" >&2
            echo "Failed to obtain NuGet API key from OIDC exchange" >&2
            exit 1
          fi

          echo "::add-mask::$API_KEY"
          echo "apikey=$API_KEY" >> "$GITHUB_OUTPUT"

      - name: Push to NuGet
        run: >
          dotnet nuget push ./artifacts/*.nupkg
          --source https://api.nuget.org/v3/index.json
          --api-key ${{ steps.nuget-auth.outputs.apikey }}
          --skip-duplicate
