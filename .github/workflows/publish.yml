name: publish

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write  # required for NuGet Trusted Publishing (OIDC)
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --logger "console;verbosity=normal"

      - name: Pack
        run: dotnet pack src/GenesisMesh.Sdk/GenesisMesh.Sdk.csproj --no-build --configuration Release --output ./artifacts

      # Upload the .nupkg so it can be downloaded if the push step fails.
      # First-time NuGet push via trusted publishing requires the package to
      # already exist on nuget.org. Download the artifact and upload manually
      # at https://www.nuget.org/packages/manage/upload — after that, all
      # future pushes will go through trusted publishing automatically.
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: ./artifacts/*.nupkg
          retention-days: 7

      - name: Obtain GitHub OIDC token (audience api.nuget.org)
        id: oidc
        uses: actions/github-script@v7
        with:
          script: |
            const token = await core.getIDToken('api.nuget.org');
            core.setSecret(token);
            core.setOutput('token', token);

      - name: Push to NuGet (Trusted Publishing)
        env:
          NUGET_TOKEN: ${{ steps.oidc.outputs.token }}
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --source https://api.nuget.org/v3/index.json \
            --api-key "$NUGET_TOKEN" \
            --skip-duplicate
