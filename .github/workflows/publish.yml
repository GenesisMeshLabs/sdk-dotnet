name: publish

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write  # required for NuGet Trusted Publishing (OIDC)
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --logger "console;verbosity=normal"

      - name: Pack
        run: dotnet pack src/GenesisMesh.Sdk/GenesisMesh.Sdk.csproj --no-build --configuration Release --output ./artifacts

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: ./artifacts/*.nupkg
          retention-days: 7

      - name: Obtain GitHub OIDC token (audience api.nuget.org)
        id: oidc
        uses: actions/github-script@v7
        with:
          script: |
            const token = await core.getIDToken('api.nuget.org');
            core.setSecret(token);
            core.setOutput('token', token);

      # NUGET_API_KEY is only needed for the very first push that creates the
      # package on NuGet.org. Once the package exists, remove the secret and
      # trusted publishing (OIDC) handles all future versions automatically.
      - name: Push to NuGet
        env:
          NUGET_OIDC: ${{ steps.oidc.outputs.token }}
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          KEY="${NUGET_API_KEY:-$NUGET_OIDC}"
          dotnet nuget push ./artifacts/*.nupkg \
            --source https://api.nuget.org/v3/index.json \
            --api-key "$KEY" \
            --skip-duplicate
